<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脫粉聲明書產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: #F3F0FF;
            min-height: 100vh;
        }

        /* Navbar 毛玻璃 */
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 聲明書繪圖區 (隱藏) */
        #capture-area {
            width: 375px; /* 固定寬度確保比例一致 */
            background: #F9F5FF;
            padding: 30px 20px;
            position: absolute;
            left: -9999px;
        }

        .section-box {
            background: rgba(235, 225, 255, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        .white-box {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
        }

        /* 藝人大頭照重疊定位 */
        .idol-photo-overlay {
            position: absolute;
            right: 15px;
            top: 155px; /* 根據截圖精準定位在區塊交界 */
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 50;
            object-fit: cover;
        }

        .seal-img {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 100px;
            transform: rotate(-10deg);
            z-index: 60;
        }

        /* 真正顯示給使用者看的圖片 */
        #final-image-result {
            width: 100%;
            max-width: 375px;
            border-radius: 24px;
            display: none;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .input-style {
            background: #F3F4F6;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body class="pb-20">

    <nav class="glass-nav flex justify-between items-center py-4 px-6 mb-8">
        <div class="text-[#A855F7] font-black text-sm">✦ 脫粉聲明書產生器</div>
        <div class="bg-purple-100 text-purple-600 text-[10px] px-3 py-1 rounded-full font-bold">道德認證</div>
    </nav>

    <div class="max-w-md mx-auto px-4">
        
        <div id="step-edit" class="bg-white rounded-[2rem] p-8 shadow-sm space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <input id="input-name" type="text" placeholder="你的暱稱 (例: 綿子)" class="input-style">
                <input id="input-idol" type="text" placeholder="對象 (例: 李周演)" class="input-style">
            </div>
            <input id="input-date" type="datetime-local" class="input-style">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="document.getElementById('input-avatar').click()" class="border-2 border-dashed border-purple-200 rounded-xl h-20 text-[10px] text-purple-400">上傳你的頭像</button>
                <button onclick="document.getElementById('input-idol-pic').click()" class="border-2 border-dashed border-purple-200 rounded-xl h-20 text-[10px] text-purple-400">上傳藝人照片</button>
                <input id="input-avatar" type="file" accept="image/*" class="hidden">
                <input id="input-idol-pic" type="file" accept="image/*" class="hidden">
            </div>
            <textarea id="input-note" class="input-style h-24" placeholder="補充說明 (例: 理性脫粉，沒錢了！)"></textarea>
            <button onclick="generate()" class="w-full bg-gradient-to-r from-purple-600 to-pink-500 text-white font-black py-4 rounded-full shadow-lg">✦ 生成聲明書 ✦</button>
        </div>

        <div id="step-preview" class="hidden text-center">
            
            <div id="capture-area">
                <p class="text-right text-[10px] text-gray-400 mb-2">No.910917</p>
                <h2 class="text-center text-[#A855F7] text-3xl font-black tracking-[0.3em] mb-8">脫粉聲明書</h2>
                
                <div class="section-box flex items-center">
                    <img id="display-avatar" class="w-20 h-20 rounded-full object-cover border-2 border-white bg-white">
                    <div class="ml-4 text-left">
                        <p class="text-[10px] text-purple-500 font-bold">聲明人</p>
                        <h4 id="display-name" class="text-3xl font-black text-gray-800"></h4>
                    </div>
                </div>

                <img id="display-idol-pic" class="idol-photo-overlay">

                <div class="white-box">
                    <p class="text-[11px] text-gray-500 mb-4 text-left">茲 聲明：本人自今日起，正式解除與</p>
                    <h3 id="display-idol-name" class="text-center text-xl font-black text-gray-900 mb-6 leading-tight"></h3>
                    <p class="text-[10px] text-gray-400 leading-relaxed text-left">
                        之粉絲關係。本聲明一經發佈即刻生效，具完整道德效力，任何人不得以任何形式要求本人重返粉籍。
                    </p>
                </div>

                <div class="white-box min-h-[180px]">
                    <p class="text-[10px] text-purple-500 font-bold mb-2 text-left">脫粉理由</p>
                    <p id="display-reason" class="text-[12px] text-gray-700 font-medium mb-12 text-left"></p>
                    
                    <div class="space-y-3 pt-4 border-t border-purple-50">
                        <p class="text-[11px] text-gray-400 text-left">聲明日期：<span id="display-date" class="border-b border-gray-300 ml-1 text-gray-600 px-2"></span></p>
                        <p class="text-[11px] text-gray-400 text-left">聲明人簽署：<span id="display-sign" class="border-b border-gray-300 ml-1 text-gray-800 font-black px-2"></span></p>
                    </div>
                    <img src="seal.png" class="seal-img">
                </div>
            </div>

            <img id="final-image-result" alt="長按圖片另存">
            
            <p class="text-gray-400 text-xs mt-6 mb-4">💡 佈局已依截圖復刻，長按上方圖片即可存檔</p>
            <button onclick="location.reload()" class="text-purple-500 text-sm font-bold">← 返回修改</button>
        </div>
    </div>

    <script>
        // 圖片上傳邏輯
        function setupUpload(inputId, imgId) {
            document.getElementById(inputId).onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => document.getElementById(imgId).src = ev.target.result;
                reader.readAsDataURL(e.target.files[0]);
            };
        }
        setupUpload('input-avatar', 'display-avatar');
        setupUpload('input-idol-pic', 'display-idol-pic');

        async function generate() {
            // 填寫內容
            const name = document.getElementById('input-name').value || '綿子';
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-sign').innerText = name;
            document.getElementById('display-idol-name').innerText = `【 ${document.getElementById('input-idol').value || '某某藝人'} 】`;
            document.getElementById('display-reason').innerText = document.getElementById('input-note').value || '理性脫粉，沒錢了！';
            
            const dateInput = document.getElementById('input-date').value;
            document.getElementById('display-date').innerText = dateInput ? dateInput.replace('T', ' ') : '2026/04/28 12:06';

            // 顯示預覽區
            document.getElementById('step-edit').classList.add('hidden');
            document.getElementById('step-preview').classList.remove('hidden');

            // 渲染圖片
            const area = document.getElementById('capture-area');
            await new Promise(r => setTimeout(r, 600)); // 等待頭像渲染完畢
            
            html2canvas(area, {
                scale: 3,
                useCORS: true,
                width: 375,
                backgroundColor: "#F3F0FF"
            }).then(canvas => {
                const finalImg = document.getElementById('final-image-result');
                finalImg.src = canvas.toDataURL('image/png');
                finalImg.style.display = 'block';
            });
        }
    </script>
</body>
</html>
